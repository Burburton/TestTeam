# AI Team Template Configuration
# This file configures the AI team for your project

project:
  name: "TestTeam"
  description: "网页版消消乐游戏 - Match-3 Puzzle Game"
  language: "typescript"
  framework: "react"

ai_team:
  version: "2.0.0"
  
  agents:
    planner: true
    architect: true
    developer: true
    qa: true
    reviewer: true
    triage: true
    ci_analyst: true

  memory:
    enabled: true
    isolation: true
    auto_archive: true
    failures_library: true

  task_system:
    enabled: true
    state_machine: true

  workflows:
    auto_trigger: true
    require_human_approval: true

rules:
  coding:
    max_function_lines: 30
    max_nesting_levels: 3
    test_coverage_threshold: 80

  git:
    branch_prefix:
      feature: "feat/"
      bugfix: "fix/"
      refactor: "refactor/"
      tech: "tech/"
    commit_convention: "conventional"

  safety:
    no_force_push: true
    no_direct_main: true
    require_pr_reviews: 1

template:
  source: "https://github.com/your-org/ai-team-template.git"
  version: "2.0.0"
  last_sync: "2026-03-14T09:35:10.319Z"
